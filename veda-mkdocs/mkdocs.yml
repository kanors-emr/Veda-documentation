      - Browse: browse.md
      - Items list: items-list.md
      - Items detail: items-detail.md
      - Model Info: model-info.md
      - Menu: veda-menu.md
  - Run and analyze:
      - Run Manager: run-manager.md
      - Results: results.md
      - Reports: reports.md
  - Tags:
      - Overview: tags/index.md
      - System settings: tags/system-settings.md
      - RES templates: tags/res-templates.md
      - Data (INS / DINS / UPD): tags/data-tags.md
      - Sets and groups: tags/sets-and-groups.md
      - Trade: tags/trade.md
      - User constraints: tags/user-constraints.md
      - Parametric scenarios: tags/parametric.md
      - Metadata: tags/metadata.md
      - Reference: tags/reference.md
  - Reference:
      - Notes:
          - Overview: notes.md
          - UPD tables: upd-tables.md
          - Fill tables: filltables.md
          - DINS tables: dins-tables.md
          - Tags processing order: tags-proc-order.md
          - Conventions: veda-conventions.md
      - Version history: version-history.md
  - Licensing:
      - License operations: license-operations.md
      - License agreement: license-agreement.md
      - Privacy policy: privacy-policy.md
  - Troubleshooting:
      - Overview: troubleshooting.md
      - Deadlock detected: trouble-deadlock.md
      - Excel exceptions: trouble-excel-exceptions.md
      - GAMS Engine credentials: trouble-gams-credentials.md
      - Problem with Microsoft Excel: trouble-excel-problem.md
