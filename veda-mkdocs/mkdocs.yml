# Veda 2.0 documentation — mkdocs-material configuration

site_name: Veda 2.0 Documentation
site_description: Veda2.0 is a data handling system for The Integrated MARKAL-EFOM System (TIMES) — a bottom-up optimization model for energy-environment systems.
site_author: KanORS-EMR
copyright: "© KanORS-EMR, 2026"
site_url: https://kanors-emr.github.io/Veda-documentation/

repo_url: https://github.com/kanors-emr/Veda2.0-Installation
repo_name: kanors-emr/Veda2.0-Installation
edit_uri: edit/master/docs/

docs_dir: docs

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  custom_dir: overrides

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      lang: [en, ja, fr, de, es, zh]
